name: Build Binaries

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, for example v0.1.0'
        required: true
        default: 'v0.1.0'
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  macos:
    name: macOS
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      - run: dart run build_runner build

      - run: flutter build macos --release

      - name: Package macOS app
        run: |
          cd build/macos/Build/Products/Release
          zip -r Plot-macOS.zip *.app

      - uses: actions/upload-artifact@v4
        with:
          name: Plot-macOS
          path: build/macos/Build/Products/Release/Plot-macOS.zip

  windows:
    name: Windows
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      - run: dart run build_runner build

      - run: flutter build windows --release

      - name: Package Windows app
        shell: pwsh
        run: |
          Compress-Archive `
            -Path build/windows/x64/runner/Release/* `
            -DestinationPath Plot-Windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: Plot-Windows
          path: Plot-Windows.zip

  linux:
    name: Linux AppImage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            curl \
            fuse \
            git \
            libgtk-3-dev \
            liblzma-dev \
            ninja-build \
            pkg-config

      - run: flutter pub get

      - run: dart run build_runner build

      - run: flutter build linux --release

      - name: Build AppImage
        run: |
          mkdir -p AppDir/usr/bin
          cp -r build/linux/x64/release/bundle/* AppDir/usr/bin/

          cat > AppDir/plot.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=Plot
          Exec=plot
          Icon=plot
          Categories=Utility;
          EOF

          cat > AppDir/plot.svg <<'EOF'
          <svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
            <rect width="256" height="256" rx="48" fill="#0A100C"/>
            <rect x="58" y="58" width="38" height="38" rx="8" fill="#E3B567"/>
            <rect x="110" y="58" width="38" height="38" rx="8" fill="#2A382F"/>
            <rect x="162" y="58" width="38" height="38" rx="8" fill="#2A382F"/>
            <rect x="58" y="110" width="38" height="38" rx="8" fill="#69AC9A"/>
            <rect x="110" y="110" width="38" height="38" rx="8" fill="#E3B567"/>
            <rect x="162" y="110" width="38" height="38" rx="8" fill="#2A382F"/>
            <rect x="58" y="162" width="38" height="38" rx="8" fill="#2A382F"/>
            <rect x="110" y="162" width="38" height="38" rx="8" fill="#69AC9A"/>
            <rect x="162" y="162" width="38" height="38" rx="8" fill="#E3B567"/>
          </svg>
          EOF

          cat > AppDir/AppRun <<'EOF'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/plot" "$@"
          EOF
          chmod +x AppDir/AppRun

          curl -L -o appimagetool \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool

          ./appimagetool AppDir Plot-linux-x86_64.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: Plot-Linux-AppImage
          path: Plot-linux-x86_64.AppImage

  android:
    name: Android
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      - run: dart run build_runner build

      - name: Configure Android signing
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "ANDROID_KEYSTORE_BASE64 is not configured"
            exit 1
          fi

          printf '%s' "$KEYSTORE_BASE64" \
            | base64 --decode \
            > android/app/upload-keystore.jks

          printf '%s\n' \
            "storePassword=$STORE_PASSWORD" \
            "keyPassword=$KEY_PASSWORD" \
            "keyAlias=$KEY_ALIAS" \
            "storeFile=$GITHUB_WORKSPACE/android/app/upload-keystore.jks" \
            > android/key.properties

      - name: Build signed Android APK
        run: flutter build apk --release

      - name: Build signed Android App Bundle
        run: flutter build appbundle --release

      - name: Package Android binaries
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk Plot-Android.apk
          cp build/app/outputs/bundle/release/app-release.aab Plot-Android.aab

      - uses: actions/upload-artifact@v4
        with:
          name: Plot-Android
          path: |
            Plot-Android.apk
            Plot-Android.aab

  ios:
    name: iOS
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      - run: dart run build_runner build

      - name: Build unsigned iOS app
        run: flutter build ios --release --no-codesign

      - name: Package unsigned iOS IPA
        run: |
          mkdir Payload
          cp -R build/ios/iphoneos/Runner.app Payload/
          zip -r Plot-iOS-unsigned.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: Plot-iOS
          path: Plot-iOS-unsigned.ipa

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs:
      - macos
      - windows
      - linux
      - android
      - ios
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Show downloaded files
        run: ls -R dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            dist/Plot-macOS.zip
            dist/Plot-Windows.zip
            dist/Plot-linux-x86_64.AppImage
            dist/Plot-Android.apk
            dist/Plot-Android.aab
            dist/Plot-iOS-unsigned.ipa
          generate_release_notes: true
