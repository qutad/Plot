name: Build Binaries

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  macos:
    name: macOS
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      - run: dart run build_runner build

      - run: flutter build macos --release

      - name: Package macOS app
        run: |
          cd build/macos/Build/Products/Release
          zip -r Plot-macOS.zip *.app

      - uses: actions/upload-artifact@v4
        with:
          name: Plot-macOS
          path: build/macos/Build/Products/Release/Plot-macOS.zip

  windows:
    name: Windows
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      - run: dart run build_runner build

      - run: flutter build windows --release

      - name: Package Windows app
        shell: pwsh
        run: |
          Compress-Archive `
            -Path build/windows/x64/runner/Release/* `
            -DestinationPath Plot-Windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: Plot-Windows
          path: Plot-Windows.zip

  linux:
    name: Linux AppImage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            curl \
            fuse \
            git \
            libgtk-3-dev \
            liblzma-dev \
            ninja-build \
            pkg-config

      - run: flutter pub get

      - run: dart run build_runner build

      - run: flutter build linux --release

      - name: Build AppImage
        run: |
          mkdir -p AppDir/usr/bin
          cp -r build/linux/x64/release/bundle/* AppDir/usr/bin/

          cat > AppDir/plot.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=Plot
          Exec=plot
          Icon=plot
          Categories=Utility;
          EOF

          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          cp linux/flutter/ephemeral/.plugin_symlinks/window_manager/example/linux/runner/resources/app_icon.png AppDir/usr/share/icons/hicolor/256x256/apps/plot.png || true

          cat > AppDir/AppRun <<'EOF'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/plot" "$@"
          EOF
          chmod +x AppDir/AppRun

          curl -L -o appimagetool \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool

          ./appimagetool AppDir Plot-linux-x86_64.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: Plot-Linux-AppImage
          path: Plot-linux-x86_64.AppImage
